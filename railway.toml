# Railway deployment config for RFAF Analytics Platform
# Docs: https://docs.railway.app/reference/config-as-code

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
startCommand = "uvicorn backend.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[[services]]
name = "backend"
source = "."

[[services]]
name = "worker"
source = "."
startCommand = "celery -A backend.workers.tasks worker --loglevel=info --concurrency=4"

[[services]]
name = "beat"
source = "."
startCommand = "celery -A backend.workers.tasks beat --loglevel=info"
