name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install ruff
        run: pip install ruff==0.6.0
      - name: Lint backend
        run: ruff check backend/

  test:
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: rfaf_user
          POSTGRES_PASSWORD: rfaf_pass
          POSTGRES_DB: rfaf_analytics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U rfaf_user -d rfaf_analytics"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://rfaf_user:rfaf_pass@localhost:5432/rfaf_analytics
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: sk-ant-test
      GOOGLE_API_KEY: test
      POSTHOG_API_KEY: phc_test
      JWT_SECRET: ci-test-secret-not-used-in-production-change-me

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install system deps
        run: sudo apt-get update && sudo apt-get install -y libpq-dev

      - name: Install Python deps
        run: pip install -r requirements.txt "pytest-asyncio>=0.24" httpx

      - name: Start backend
        run: |
          uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
          sleep 3
          curl -f http://localhost:8000/api/health

      - name: Run tests
        run: python -m pytest backend/tests/test_endpoints.py backend/tests/test_auth.py -v --tb=short

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm run build
